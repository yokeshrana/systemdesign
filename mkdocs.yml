site_name: System Design Prep Notes
site_description: Comprehensive system design interview preparation guide
site_author: yokeshrana
site_url: https://yokeshrana.github.io/systemdesign/

theme:
  name: readthedocs
  highlightjs: true
  hljs_languages:
    - yaml
    - python
    - javascript

extra_css:
  - assets/stylesheets/custom.css

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence.fence_mermaid
  - pymdownx.highlight
  - pymdownx.tasklist
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Interview Framework:
    - Overview: interview-framework/index.md
    - Alternative Frameworks: interview-framework/approaches.md
    - Trade-offs and Rules of Thumb: interview-framework/trade-offs.md
    - 1. Requirements Clarification: interview-framework/requirements-clarification.md
    - 2. System Interface Definition: interview-framework/system-interface.md
    - 3. Back-of-the-Envelope Estimation: interview-framework/estimation.md
    - 4. Data Model Definition: interview-framework/data-model.md
    - 5. High-Level Design: interview-framework/high-level-design.md
    - 6. Detailed Design: interview-framework/detailed-design.md
    - 7. Bottlenecks and Scaling: interview-framework/bottlenecks.md
  - Books:
    - Overview: books/index.md
    - Grokking System Design Interview: books/grokking-system-design.md
  - Fundamentals:
    - Overview: fundamentals/index.md
    - System Design Basics: fundamentals/basics.md
    - Scalability: fundamentals/scalability.md
    - Load Balancing: fundamentals/load-balancing.md
    - Consistency Models: fundamentals/consistency.md
    - Replication & Redundancy: fundamentals/replication.md
    - Client-Server Communication: fundamentals/communication.md
    - High Level Design vs Low Level Design: fundamentals/hld-vs-lld.md
  - Components:
    - Overview: components/index.md
    - Caching: components/caching.md
    - Databases: components/databases.md
    - Message Queues: components/message-queues.md
    - Indexing: components/indexing.md
    - Proxies: components/proxies.md
  - Advanced:
    - Overview: advanced/index.md
    - Microservices: advanced/microservices.md
    - API Design: advanced/api-design.md
    - Authentication: advanced/authentication.md
    - Consistent Hashing: advanced/consistent-hashing.md
    - Database Sharding: advanced/sharding.md
    - Top 'K' Frequent Items: advanced/top-k.md
  - Operations:
    - Overview: operations/index.md
    - Networking & CDN: operations/networking.md
    - Monitoring & Logging: operations/monitoring.md
    - Deployment: operations/deployment.md
  - Case Studies:
    - Overview: case-studies/index.md
    - Case Study Playbook: case-studies/playbook.md
    - Instagram Design: case-studies/instagram.md
    - Twitter Design: case-studies/twitter.md
    - Dropbox / Google Drive: case-studies/dropbox.md
    - Facebook Newsfeed: case-studies/facebook-newsfeed.md
    - Facebook Messenger: case-studies/facebook-messenger.md
    - Twitter Search: case-studies/twitter-search.md
    - Yelp (Proximity Server): case-studies/yelp.md
    - Ticketmaster: case-studies/ticketmaster.md
    - URL Shortener: case-studies/url-shortener.md
    - Pastebin: case-studies/pastebin.md
    - Web Crawler: case-studies/web-crawler.md
    - Uber ETA: case-studies/uber.md
    - Netflix Design: case-studies/netflix.md
    - YouTube Design: case-studies/youtube.md
    - Typeahead Suggestion: case-studies/typeahead-suggestion.md
    - API Rate Limiter: case-studies/api-rate-limiter.md

site_name: System Design Prep Notes
site_description: Comprehensive system design interview preparation guide
site_author: yokeshrana
site_url: https://yokeshrana.github.io/systemdesign/

theme:
  name: readthedocs
  highlightjs: true
  hljs_languages:
    - yaml
    - python
    - javascript

extra_css:
  - assets/stylesheets/custom.css

extra_javascript:
  - https://unpkg.com/mermaid/dist/mermaid.min.js
  - assets/javascripts/mermaid-init.js

plugins:
  - search
  # - social

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.mermaid_format
  - pymdownx.highlight
  - pymdownx.tasklist
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Fundamentals:
    - System Design Basics: fundamentals/basics.md
    - Scalability: fundamentals/scalability.md
    - Load Balancing: fundamentals/load-balancing.md
    - Consistency Models: fundamentals/consistency.md
    - High Level Design vs Low Level Design: fundamentals/hld-vs-lld.md
  - Components:
    - Caching: components/caching.md
    - Indexing: components/indexing.md
    - Message Queues: components/message-queues.md
    - Databases: components/databases.md
    - Proxies: components/proxies.md
  - Advanced:
    - Microservices: advanced/microservices.md
    - API Design: advanced/api-design.md
    - Authentication: advanced/authentication.md
    - Consistent Hashing: advanced/consistent-hashing.md
    - Database Sharding: advanced/sharding.md
  - Operations:
    - Networking & CDN: operations/networking.md
    - Monitoring & Logging: operations/monitoring.md
    - Deployment: operations/deployment.md
  - Case Studies:
    - Popular Services: case-studies/index.md
    - Instagram Design: case-studies/instagram.md
    - Twitter Design: case-studies/twitter.md
    - URL Shortener: case-studies/url-shortener.md
    - Uber ETA: case-studies/uber.md
    - Netflix Design: case-studies/netflix.md
    - YouTube Design: case-studies/youtube.md
